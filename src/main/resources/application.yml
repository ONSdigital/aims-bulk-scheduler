application-description: Monitor BigQuery tables to determine when streaming buffer is empty and table can be exported
application-version: 0.0.24
spring:
  application:
    name: bulk-service-scheduler
  cloud:
    gcp:
      project-id: YOUR-GCP-PROJECT-ID-HERE
      bigquery:
        dataset-name: bulk_status
      sql:
        enabled: false
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          jobStore: 
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
          threadPool:
            threadCount: 5
  datasource:
    url: YOUR-URL
    username: YOUR-SA
  sql:
    init:
      platform: mysql
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
    enabled-by-default: false
  endpoint:
    info:
      enabled: true
    health:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
logging:
  level:
    root: INFO
    uk:
      gov:
        ons: INFO
aims:
  pubsub:
    subscription: processing-finished-subscription
    export-topic: bulk-scheduler-export
  scheduler:
    frequency-minutes: 5